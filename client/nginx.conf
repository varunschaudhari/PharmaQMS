server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # React Router (client-side routing, including the /s/:code mobile deep links) — always fall
  # back to index.html so a hard refresh on a nested route doesn't 404.
  location / {
    try_files $uri /index.html;
  }
}
